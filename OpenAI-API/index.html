<html>
    <head>
        <title>PollyGlot</title>
        <meta charset="UTF-8"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="header">
            <img src="assets/worldmap.png" alt="World map as a header background">
            <img src="assets/parrot.png" alt="Multi colored Parrot">
            <h1>PollyGlot<br><span>Perfect Translation Every Time</span></h1>
        </div>

        <main>
            <form>
                <label for="text-to-translate">Text to translate</label>
                <input id="text-to-translate" type="submit" required value="Translate">
                <ul class="language-list">
                    <li><a>Spanish</a><img src="assets/sp-flag.png"></li>
                    <li><a>Japanese</a><img src="assets/jpn-flag.png"></li>
                    <li><a>French</a><img src="assets/fr-flag.png"></li>
                </ul>
                
            </form>
        </main>

        <script src="script.js" type="module"></script>
    </body>

</html>
